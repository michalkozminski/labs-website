<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    /* Radial vignette to push waves away from text */
    #content::before {
      content: '';
      position: absolute;
      width: 140%;
      height: 140%;
      background: radial-gradient(ellipse at center, rgba(17,17,17,0.85) 0%, rgba(17,17,17,0.5) 35%, transparent 65%);
      pointer-events: none;
      z-index: -1;
      animation: breathe 8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.12); opacity: 0.85; }
    }

    #content > * {
      pointer-events: auto;
    }

    h1 {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 6rem;
      font-weight: 400;
      color: #e8e8e8;
      letter-spacing: 0.15em;
      margin-bottom: 0.3em;
    }

    p {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: rgba(210, 215, 220, 0.55);
      letter-spacing: 0.05em;
      font-style: italic;
    }

    .projects {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .project {
      text-align: center;
    }

    .projects a {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 1.1rem;
      color: rgba(232, 232, 232, 0.9);
      text-decoration: none;
      border-bottom: 1px solid rgba(210, 215, 220, 0.35);
      transition: color 0.2s, border-color 0.2s;
    }

    .projects a:hover {
      color: #fff;
      border-color: rgba(210, 215, 220, 0.7);
    }

    .projects .desc {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 0.9rem;
      color: rgba(210, 215, 220, 0.55);
      margin-top: 0.35rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <canvas id="waves"></canvas>

  <div id="content">
    <h1>Labs</h1>
    <p>my personal experiments</p>
    <div class="projects">
      <div class="project">
        <a href="https://github.com/michalkozminski/iCalito">iCalito</a>
        <div class="desc">Next meeting tile for Stream Deck (macOS)</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('waves');
    const ctx = canvas.getContext('2d');

    let W, H, cols;
    const CHAR_W = 10;
    const CHAR_H = 16;

    // Characters ordered by visual "weight" — used to cycle over time
    const waveChars = ['.', ':', '-', '~', '=', '+', '*', '#'];

    // Simple deterministic hash for stable per-frame segment placement
    function hash(a, b) {
      let h = (a * 2654435761 ^ b * 340573321) >>> 0;
      h = ((h >>> 16) ^ h) * 0x45d9f3b >>> 0;
      return (h & 0xffff) / 0xffff;
    }

    // Pick a character that shifts over time
    function charAt(waveIdx, col, time) {
      // Base index from position (deterministic per cell)
      const base = hash(waveIdx + 1234, col) * waveChars.length;
      // Slowly cycle through characters over time
      const cycle = time * (0.3 + hash(waveIdx, col + 777) * 0.4);
      const idx = Math.floor(base + cycle) % waveChars.length;
      return waveChars[idx];
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cols = Math.ceil(W / CHAR_W);
      buildWaveSegments();
    }

    window.addEventListener('resize', resize);

    // Wave lines
    const NUM_WAVES = 25;
    const waves = [];

    for (let i = 0; i < NUM_WAVES; i++) {
      const t = i / NUM_WAVES;
      waves.push({
        baseY: t,
        // Primary wave — long, slow undulation
        amplitude: 4 + Math.random() * 6,
        frequency: 0.004 + Math.random() * 0.006,
        speed: 0.15 + Math.random() * 0.2,
        phase: Math.random() * Math.PI * 2,
        // Secondary wave — subtle variation
        amp2: 2 + Math.random() * 4,
        freq2: 0.01 + Math.random() * 0.015,
        speed2: 0.25 + Math.random() * 0.3,
        phase2: Math.random() * Math.PI * 2,
        opacity: 0.12 + t * 0.50,
        segments: [], // pre-built segment layout
      });
    }

    // Pre-compute segment placement per wave so it's stable across frames
    function buildWaveSegments() {
      for (let i = 0; i < waves.length; i++) {
        const wave = waves[i];
        const t = i / NUM_WAVES;
        const density = 0.15 + t * 0.55;
        const segs = [];
        let col = 0;

        while (col < cols - 2) {
          const r = hash(i, col);
          if (r < density) {
            const segLen = 2 + Math.floor(hash(i + 500, col) * 4);
            segs.push({ col, len: Math.min(segLen, cols - col) });
            const gap = 1 + Math.floor(hash(i + 700, col) * 3);
            col += segLen + gap;
          } else {
            col += 1 + Math.floor(hash(i + 300, col) * 2);
          }
        }

        wave.segments = segs;
      }
    }

    resize();

    function draw(time) {
      const t = time * 0.001;

      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);

      ctx.font = `${CHAR_H - 2}px "Courier New", "Consolas", monospace`;
      ctx.textBaseline = 'top';

      for (const wave of waves) {
        ctx.fillStyle = `rgba(210, 215, 220, ${wave.opacity})`;
        const basePixelY = wave.baseY * H;

        const wIdx = waves.indexOf(wave);
        for (const { col, len } of wave.segments) {
          for (let s = 0; s < len; s++) {
            const c = col + s;
            const x = c * CHAR_W;
            const y1 = Math.sin(x * wave.frequency + t * wave.speed + wave.phase) * wave.amplitude;
            const y2 = Math.sin(x * wave.freq2 + t * wave.speed2 + wave.phase2) * wave.amp2;
            const y = basePixelY + y1 + y2;
            ctx.fillText(charAt(wIdx, c, t), x, y);
          }
        }
      }

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>
</body>
</html>
